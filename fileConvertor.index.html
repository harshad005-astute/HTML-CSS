<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-File Converter</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>

<body>

    <div class="card">
        <h2>File Converter</h2>
        <input type="file" id="fileInput">

        <div class="grid">
            <button class="btn" onclick="convertImageToPdf()">Photo to PDF</button>
            <button class="btn" onclick="convertWordToPdf()">Word to PDF (Text Only)</button>
            <button class="btn" onclick="convertPdfToPhoto()">PDF to Photo</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
