<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Hotel - Digital Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Grand Hotel</h1>
        <p>Digital Room Service Menu</p>
    </header>

    <main>
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterMenu('all')">All</button>
            <button class="filter-btn" onclick="filterMenu('starter')">Starters</button>
            <button class="filter-btn" onclick="filterMenu('main')">Mains</button>
            <button class="filter-btn" onclick="filterMenu('dessert')">Desserts</button>
            <button class="filter-btn" onclick="filterMenu('beverage')">Beverages</button>
        </div>

        <div id="menu-container" class="menu-grid"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
